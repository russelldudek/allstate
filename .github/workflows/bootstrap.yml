name: Install complete Allstate candidate campaign

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/bootstrap.yml'

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out campaign branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reconstruct and validate source package
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/payload-part-* | base64 --decode > /tmp/allstate-source.tar.gz
          echo "f30c2fc06fefdb30fb4c06179ae3f3a5c827e4879c78b950e45d5bcb4ae52cb1  /tmp/allstate-source.tar.gz" | sha256sum --check
          tar -xzf /tmp/allstate-source.tar.gz -C .

      - name: Install PDF dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-lato libpango-1.0-0 libpangoft2-1.0-0 librsvg2-bin poppler-utils qpdf
          python -m pip install --upgrade pip
          python -m pip install weasyprint

      - name: Install official brand asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/brand
          curl --fail --location --retry 3 \
            --user-agent 'Mozilla/5.0' \
            --referer 'https://agents.allstate.com/' \
            --output assets/brand/allstate-hands.png \
            https://agents.allstate.com/permanent-b0b701/assets/images/beacon.3f4c3812.png || true
          if ! file assets/brand/allstate-hands.png 2>/dev/null | grep -qi 'PNG image data'; then
            rm -f assets/brand/allstate-hands.png
            curl --fail --location --retry 3 \
              --user-agent 'Mozilla/5.0' \
              --output /tmp/allstate-logo.svg \
              https://upload.wikimedia.org/wikipedia/en/3/30/Allstate_logo.svg
            rsvg-convert --format png --output assets/brand/allstate-hands.png /tmp/allstate-logo.svg
          fi
          test -s assets/brand/allstate-hands.png
          file assets/brand/allstate-hands.png | grep -qi 'PNG image data'

      - name: Generate printable artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs
          weasyprint resume.html docs/Russell-Dudek-Allstate-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-Allstate-Cover-Letter.pdf
          weasyprint interview-brief.html docs/Russell-Dudek-Allstate-Interview-Brief.pdf
          weasyprint 120-day-plan.html docs/Russell-Dudek-Allstate-120-Day-Plan.pdf
          weasyprint ai-action-trace.html docs/Russell-Dudek-Allstate-AI-Action-Trace-Review.pdf

      - name: Verify PDF contracts and confidentiality
        shell: bash
        run: |
          set -euo pipefail
          test "$(pdfinfo docs/Russell-Dudek-Allstate-Resume.pdf | awk '/^Pages:/{print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-Allstate-Cover-Letter.pdf | awk '/^Pages:/{print $2}')" = "1"
          test "$(pdfinfo docs/Russell-Dudek-Allstate-Interview-Brief.pdf | awk '/^Pages:/{print $2}')" = "4"
          test "$(pdfinfo docs/Russell-Dudek-Allstate-120-Day-Plan.pdf | awk '/^Pages:/{print $2}')" = "3"
          test "$(pdfinfo docs/Russell-Dudek-Allstate-AI-Action-Trace-Review.pdf | awk '/^Pages:/{print $2}')" = "2"
          for pdf in docs/*.pdf; do
            qpdf --check "$pdf"
            pdftotext "$pdf" "${pdf%.pdf}.txt"
          done
          ! grep -RIniE 'role[ -]?forge|russelldudek/roleforge' \
            --exclude-dir=.git --exclude-dir=.bootstrap --exclude='bootstrap.yml' .
          rm -f docs/*.txt

      - name: Publish complete campaign to pull-request branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap
          rm -f .github/workflows/pages.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete Allstate AI platforms candidate campaign"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
